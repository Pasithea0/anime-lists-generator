name: Generate Anime Lists

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Create application.properties
        run: |
          if [ -z "${{ secrets.TMDB_API_KEY }}" ]; then
            echo "ERROR: TMDB_API_KEY secret is not set" >&2
            exit 1
          fi
          mkdir -p src/main/resources
          echo "spring.application.name=anime-lists-generator" > src/main/resources/application.properties
          echo "project.path=${{ github.workspace }}/data" >> src/main/resources/application.properties
          echo "project.apikey.themoviedb=${{ secrets.TMDB_API_KEY }}" >> src/main/resources/application.properties

      - name: Build with Maven
        run: mvn -B package -DskipTests

      - name: Run generator
        run: |
          java -jar target/anime-lists-generator-*.jar \
            --spring.profiles.active=prod \
            --project.apikey.themoviedb="${{ secrets.TMDB_API_KEY }}"

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -d data ] && [ "$(ls -A data 2>/dev/null)" ]; then
            git add data/
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore: update generated anime lists"
              git push
            fi
          else
            echo "No data directory or empty - nothing to commit"
          fi
